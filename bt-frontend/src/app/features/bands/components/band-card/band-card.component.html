<mat-card class="band-card">
  <mat-card-header>
    @if (band().logoUrl) {
      <img mat-card-avatar [src]="band().logoUrl" [alt]="band().name + ' logo'" class="band-logo" />
    } @else {
      <div mat-card-avatar class="band-logo-placeholder">
        {{ band().name.charAt(0).toUpperCase() }}
      </div>
    }
    <mat-card-title>{{ band().name }}</mat-card-title>
    @if (band().genre) {
      <mat-card-subtitle>{{ band().genre }}</mat-card-subtitle>
    }
  </mat-card-header>

  <mat-card-content>
    <div class="band-meta">
      @if (band().founded) {
        <mat-chip-set><mat-chip>Est. {{ band().founded }}</mat-chip></mat-chip-set>
      }
      <mat-chip-set>
        <mat-chip>{{ band().members.length }} member{{ band().members.length !== 1 ? 's' : '' }}</mat-chip>
      </mat-chip-set>
    </div>
  </mat-card-content>

  <mat-card-actions align="end">
    <button mat-button color="primary" (click)="select.emit(band().id)">Select</button>
    <button mat-button (click)="edit.emit(band().id)">Edit</button>
    <button mat-button color="warn" (click)="delete.emit(band().id)">Delete</button>
  </mat-card-actions>
</mat-card>
