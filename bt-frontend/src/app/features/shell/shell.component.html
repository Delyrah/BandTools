<mat-sidenav-container class="app-container">
  <mat-sidenav mode="side" opened class="app-sidenav">
    <mat-toolbar>
      <span>BandTools</span>
    </mat-toolbar>

    <div class="sidenav-user">
      <mat-icon>account_circle</mat-icon>
      <span>{{ authService.currentUser()?.displayName }}</span>
    </div>

    <mat-nav-list>
      <a mat-list-item routerLink="/bands" routerLinkActive="active-link">
        <mat-icon matListItemIcon>music_note</mat-icon>
        <span matListItemTitle>Bands</span>
      </a>
    </mat-nav-list>

    <div class="sidenav-footer">
      <button mat-stroked-button (click)="authService.logout()">
        <mat-icon>logout</mat-icon>
        Sign out
      </button>
    </div>
  </mat-sidenav>

  <mat-sidenav-content>
    <router-outlet />
  </mat-sidenav-content>
</mat-sidenav-container>
